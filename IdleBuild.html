<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Idle Idleness</title>
	<link rel="stylesheet" href="IdleBuild.css">
</head>
<body>

<!--skeleton for game-->
<div id="TopDiv">
<h1 id="tick"></h1>
</div>
<div id="stats">
	<div id="speedStat">
	</div>
	
	<div id="numberStat">
	<h4 id="day"></h4>
	<h4 id="AmountOfMoney"></h4>
	</div>
	
	<div id="otherStat">
	<p id="autoSave"></p>
	</div>
</div>
<div id="content">
<!--button switchers-->
<div id="switchers">
<button onclick ="switchContent('getMatsContent', 'getMaterials'); initiation()" class="switchers" id="getMaterials">locked</button>
<button onclick ="switchContent('buildContent', 'build')" class="switchers" id="build">locked</button>
<button onclick ="switchContent('shopContent', 'shop')" class="switchers" id="shop">locked</button>
<button onclick ="switchContent('sellDestroyContent', 'sellDestroy')" class="switchers" id="sellDestroy">locked</button>
<button onclick ="switchContent('investmentContent', 'investment')" class="switchers" id="investment">locked</button>
<button onclick ="switchContent('learnContent', 'learn')" class="switchers" id="learn">locked</button>
<button onclick ="switchContent('earnMoreMoneyContent', 'earnMoreMoney')" class="switchers" id="earnMoreMoney">locked</button>
<button onclick ="switchContent('prestigeContent', 'prestige')" class="switchers" id="prestige">locked</button>
<button onclick ="switchContent('asensionContent', 'asension')" class="switchers" id="asension">locked</button>
</div>


<!--content divs-->
<div id="inTheBeginning">
<button onclick ="increaseMoney()">beg for money</button>
</div>
<div id="shopContent" style="display: none;">
<button onclick ="buyWoodAxe()" id="buyWoodAxe">buy wood axe, $45</button>
</div>
<div id="getMatsContent" style="display: none;">
<img id="person" src='stickman-removebg.png'></img>
<span id="tool"></span>
</div>
<div id="buildContent" style="display: none;">
<p>build</p>
</div>
<div id="sellDestroyContent" style="display: none;">
<p>sell/buy/destroy</p>
</div>
<div id="investmentContent" style="display: none;">
<p>invest</p>
</div>
<div id="learnContent" style="display: none;">
<p>become smart</p>
</div>
<div id="earnMoreMoneyContent" style="display: none;">
<p>earn money</p>
</div>
<div id="prestigeContent" style="display: none;">
<p>prestige</p>
</div>
<div id="asensionContent" style="display: none;">
<p>ascend</p>
</div>
</div>
</body>
<script src="IdleBuild.js"></script>
</html>
